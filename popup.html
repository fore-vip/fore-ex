<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前凌智选 - 产品搜索</title>
    <link rel="stylesheet" href="styles.css">
    <!-- 前凌智选 Chrome 插件 v1.4.4 | MCP: https://api.fore.vip/mcp/query_kl -->
</head>
<body>
    <!-- Header: 搜索框 + 发布按钮 -->
    <div class="header">
        <!-- 搜索框 -->
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="搜索产品...">
            <button class="search-btn-inline" id="searchBtn">搜索</button>
        </div>
        
        <!-- 发布按钮（icon.png） -->
        <div class="publish-btn" id="publishBtn" title="发布">
            <img src="icon.png" alt="发布" class="logo-icon">
            <!-- 下拉菜单 -->
            <div class="publish-menu" id="publishMenu">
                <a href="#" class="publish-menu-item" id="publishProduct">📦 发布产品</a>
                <a href="#" class="publish-menu-item" id="publishActivity">📅 发布活动</a>
                <a href="#" class="publish-menu-item" id="aboutLink">ℹ️ 关于</a>
            </div>
        </div>
    </div>
    
    <!-- 错误提示 -->
    <div class="error-message" id="errorMessage"></div>
    
    <!-- 产品列表 -->
    <div class="product-list" id="productList">
        <div class="loading">加载中...</div>
    </div>
    
    <!-- 自动加载 -->
    <div class="auto-load-indicator" id="autoLoadIndicator">加载更多</div>
    <div class="no-more" id="noMore">没有更多了</div>
    
    <script src="popup.js"></script>
</body>
</html>
