<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>测试 MCP 接口</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .result { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        button { padding: 10px 20px; background: #fb7701; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>测试 MCP 活动创建接口</h1>
    <button onclick="testTools()">测试工具列表</button>
    <button onclick="testCreate()">测试创建活动</button>
    <div id="result"></div>
    
    <script>
        const MCP_URL = 'https://fore.vip/mcp/tools/call';
        const TOOLS_URL = 'https://fore.vip/mcp/tools/list';
        
        async function testTools() {
            try {
                const res = await fetch(TOOLS_URL);
                const data = await res.json();
                document.getElementById('result').innerHTML = 
                    '<div class="result success"><h3>工具列表:</h3><pre>' + 
                    JSON.stringify(data, null, 2) + '</pre></div>';
            } catch (e) {
                document.getElementById('result').innerHTML = 
                    '<div class="result error">错误：' + e.message + '</div>';
            }
        }
        
        async function testCreate() {
            try {
                const res = await fetch(MCP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        name: 'create_activity',
                        arguments: {
                            content: '测试活动',
                            start_time: Date.now() + 3600000,
                            end_time: Date.now() + 7200000,
                            address: '测试地址',
                            wx: 'test',
                            range: 0
                        }
                    })
                });
                const data = await res.json();
                document.getElementById('result').innerHTML = 
                    '<div class="result"><pre>' + JSON.stringify(data, null, 2) + '</pre></div>';
            } catch (e) {
                document.getElementById('result').innerHTML = 
                    '<div class="result error">错误：' + e.message + '</div>';
            }
        }
    </script>
</body>
</html>
