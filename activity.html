<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建活动 - 前凌智选</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 24px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #fb7701;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .datetime-row {
            display: flex;
            gap: 16px;
        }
        
        .datetime-row .form-group {
            flex: 1;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #fb7701;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }
        
        .btn:hover {
            background: #e56a00;
        }
        
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .help-text {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #fb7701;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 创建活动</h1>
        
        <div id="message" class="message"></div>
        
        <form id="activityForm">
            <div class="form-group">
                <label for="kid">关联机器人 ID</label>
                <input type="text" id="kid" name="kid" placeholder="留空则使用第一个机器人">
                <div class="help-text">可选，留空将自动使用您的第一个机器人</div>
            </div>
            
            <div class="form-group">
                <label for="content">活动标题 *</label>
                <textarea id="content" name="content" required placeholder="请输入活动标题（至少 2 个字符）"></textarea>
            </div>
            
            <div class="datetime-row">
                <div class="form-group">
                    <label for="start_time">开始时间 *</label>
                    <input type="datetime-local" id="start_time" name="start_time" required>
                </div>
                
                <div class="form-group">
                    <label for="end_time">结束时间</label>
                    <input type="datetime-local" id="end_time" name="end_time">
                </div>
            </div>
            
            <div class="form-group">
                <label for="address">活动地址 *</label>
                <input type="text" id="address" name="address" required placeholder="请输入活动详细地址">
            </div>
            
            <div class="form-group">
                <label for="wx">联系方式（微信）*</label>
                <input type="text" id="wx" name="wx" required placeholder="请输入微信或其他联系方式">
            </div>
            
            <div class="form-group">
                <label for="range">门票价格（元）</label>
                <input type="number" id="range" name="range" min="0" step="0.01" value="0" placeholder="0 表示免费">
                <div class="help-text">输入 0 表示免费活动</div>
            </div>
            
            <div class="form-group">
                <label for="url">外部链接</label>
                <input type="text" id="url" name="url" placeholder="https://...">
            </div>
            
            <button type="submit" class="btn" id="submitBtn">创建活动</button>
        </form>
        
        <div class="loading" id="loading"></div>
    </div>
    
    <script>
        // MCP 服务器地址
        const MCP_URL = 'https://fore.vip/mcp/tools/call';
        
        document.getElementById('activityForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const message = document.getElementById('message');
            
            // 隐藏之前的消息
            message.style.display = 'none';
            message.className = 'message';
            
            // 获取表单数据
            const formData = {
                kid: document.getElementById('kid').value || undefined,
                content: document.getElementById('content').value,
                start_time: new Date(document.getElementById('start_time').value).getTime(),
                end_time: document.getElementById('end_time').value ? 
                    new Date(document.getElementById('end_time').value).getTime() : undefined,
                address: document.getElementById('address').value,
                wx: document.getElementById('wx').value,
                range: parseFloat(document.getElementById('range').value) * 100 || 0,
                url: document.getElementById('url').value || undefined
            };
            
            // 验证
            if (!formData.content || formData.content.length < 2) {
                showMessage('活动标题至少需要 2 个字符', 'error');
                return;
            }
            
            if (!formData.start_time) {
                showMessage('请选择开始时间', 'error');
                return;
            }
            
            if (formData.end_time && formData.end_time <= formData.start_time) {
                showMessage('结束时间必须晚于开始时间', 'error');
                return;
            }
            
            if (!formData.address) {
                showMessage('请输入活动地址', 'error');
                return;
            }
            
            if (!formData.wx) {
                showMessage('请输入联系方式', 'error');
                return;
            }
            
            // 禁用按钮，显示加载
            submitBtn.disabled = true;
            loading.style.display = 'block';
            
            try {
                // 调用 MCP 接口
                const response = await fetch(MCP_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        name: 'create_activity',
                        arguments: formData
                    })
                });
                
                const result = await response.json();
                
                if (result.error) {
                    throw new Error(result.error.message);
                }
                
                if (result.result && result.result.content) {
                    const data = JSON.parse(result.result.content[0].text);
                    
                    if (data.success) {
                        showMessage('活动创建成功！<br><a href="' + data.url + '" target="_blank">点击查看活动详情</a>', 'success');
                        document.getElementById('activityForm').reset();
                    } else {
                        throw new Error(data.message || '创建失败');
                    }
                } else {
                    throw new Error('响应格式错误');
                }
                
            } catch (error) {
                showMessage('创建失败：' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        });
        
        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.innerHTML = text;
            message.className = 'message ' + type;
            message.style.display = 'block';
        }
        
        // 设置默认时间为当前时间后 1 小时
        const now = new Date();
        now.setHours(now.getHours() + 1);
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('start_time').value = now.toISOString().slice(0, 16);
        
        // 设置默认结束时间为开始时间后 2 小时
        const endTime = new Date(now.getTime() + 2 * 60 * 60 * 1000);
        document.getElementById('end_time').value = endTime.toISOString().slice(0, 16);
    </script>
</body>
</html>
