<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前凌智选 - 发布活动</title>
    <link rel="stylesheet" href="styles.css">
    <!-- 前凌智选 Chrome 插件 - 活动发布 v1.5.0 | MCP: https://api.fore.vip/mcp/create_activity -->
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="search-box" style="cursor: pointer;" onclick="window.location.href='popup.html'">
            <span class="search-icon">←</span>
            <span style="color: #999; font-size: 14px;">返回产品搜索</span>
        </div>
    </div>
    
    <!-- 错误提示 -->
    <div class="error-message" id="errorMessage"></div>
    
    <!-- 活动发布表单 -->
    <div class="activity-form">
        <form id="activityForm">
            <div class="form-group">
                <label for="content">活动标题 *</label>
                <textarea id="content" name="content" required placeholder="请输入活动标题（至少 2 个字符）"></textarea>
            </div>
            
            <div class="datetime-row">
                <div class="form-group">
                    <label for="start_time">开始时间 *</label>
                    <input type="datetime-local" id="start_time" name="start_time" required>
                </div>
                
                <div class="form-group">
                    <label for="end_time">结束时间</label>
                    <input type="datetime-local" id="end_time" name="end_time">
                </div>
            </div>
            
            <div class="form-group">
                <label for="address">活动地址 *</label>
                <input type="text" id="address" name="address" required placeholder="请输入活动详细地址">
            </div>
            
            <div class="form-group">
                <label for="wx">联系方式（微信）*</label>
                <input type="text" id="wx" name="wx" required placeholder="请输入微信或其他联系方式">
            </div>
            
            <div class="form-group">
                <label for="range">门票价格（元）</label>
                <input type="number" id="range" name="range" min="0" step="0.01" value="0" placeholder="0 表示免费">
                <div class="help-text">输入 0 表示免费活动</div>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">创建活动</button>
        </form>
        
        <div class="loading-spinner" id="loading"></div>
    </div>
    
    <script src="activity.js"></script>
</body>
</html>
